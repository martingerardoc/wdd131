<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WDD 131 - Dynamic Web Fundamentals - Cespedes Martin. Form page."/>
    <meta name="Description" content="Form">
    <meta name="author" content="Cespedes Martin" />
    <title>Product Review Form</title>
    <link rel="stylesheet" href="/week05/Form-start/css/formStyle.css">
    <script defer src="/week05/Form-start/js/formScript.js"></script>
</head>
<body>
    <div class="container">
        <h1>Product Review Form</h1>
        <form action="review.html" method="get" id="productReviewForm">
            <label for="productName">Product Name:</label>
            <select id="productName" name="productName" required>
                <option value="" disabled selected>Select a Product ...</option>
            </select>

            <label>Overall Rating:</label>
            <div class="rating">
                <label>
                    <input type="radio" name="rating" value="1" required> ☆
                </label>
                <label>
                    <input type="radio" name="rating" value="2" required> ☆☆
                </label>
                <label>
                    <input type="radio" name="rating" value="3" required> ☆☆☆
                </label>
                <label>
                    <input type="radio" name="rating" value="4" required> ☆☆☆☆
                </label>
                <label>
                    <input type="radio" name="rating" value="5" required> ☆☆☆☆☆
                </label>
            </div>

            <label for="installationDate">Date of Installation:</label>
            <input type="date" id="installationDate" name="installationDate" required>

            <fieldset>
                <legend>Useful Features:</legend>
                <label><input type="checkbox" name="features" value="Feature 1"> Feature 1</label>
                <label><input type="checkbox" name="features" value="Feature 2"> Feature 2</label>
                <label><input type="checkbox" name="features" value="Feature 3"> Feature 3</label>
            </fieldset>

            <label for="writtenReview">Written Review:</label>
            <textarea id="writtenReview" name="writtenReview"></textarea>

            <label for="userName">User Name:</label>
            <input type="text" id="userName" name="userName">

            <input type="submit" value="Submit Review">
        </form>
    </div>
    <footer contenteditable>
        <p>&copy; <span id="currentyear"></span> Martin Cespedes. Argentina, Buenos Aires.</p>
        <p id="lastModified"></p>
      </footer>
</body>
</html>
